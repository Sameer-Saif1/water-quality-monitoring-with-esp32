name: water_quality_app
description: "Water quality monitoring dashboard with admin-managed user access."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Charts for historical data
  fl_chart: ^0.69.0

  # Icons
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Date formatting for chart axes / timestamps
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
